<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morska Przygoda</title>
    <style>
        /* ================= MOTYW PLAŻOWY ================= */
        :root {
            --sky: #87CEEB;
            --sea-light: #48cae4;
            --sea-deep: #0077b6;
            --sand: #f4a261;
            --dark-blue: #023e8a;
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, 
                var(--sky) 0%, var(--sky) 20%, 
                var(--sea-light) 20%, var(--sea-deep) 70%, 
                var(--sand) 70%, var(--sand) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            background: rgba(255, 255, 255, 0.95);
            width: 90%; max-width: 800px; padding: 30px;
            border-radius: 20px; border: 6px solid var(--dark-blue);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center; overflow: hidden;
        }

        h1 { color: var(--dark-blue); font-size: 2.2em; text-transform: uppercase; border-bottom: 3px dashed var(--sea-light); padding-bottom: 10px; }
        h2 { color: var(--sea-deep); }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        button {
            background: var(--dark-blue); color: white;
            border: none; padding: 12px 25px;
            font-size: 1.1em; border-radius: 50px;
            cursor: pointer; margin: 8px; font-weight: bold;
            transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { background: var(--sea-deep); transform: translateY(-3px); }
        button.back-btn { background: #e76f51; }
        button.back-btn:hover { background: #f4a261; }
        button.score-btn { background: gold; color: var(--dark-blue); border: 2px solid var(--dark-blue); }
        button.action-btn { background: #2a9d8f; font-size: 1.2em; padding: 15px 30px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* ================= ARCADE SCOREBOARD ================= */
        .arcade-screen {
            background-color: #050505; color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            border-radius: 15px; padding: 30px;
            box-shadow: inset 0 0 30px rgba(0, 255, 0, 0.2);
            border: 4px solid #333;
        }
        .arcade-title {
            color: #f0f; text-shadow: 0 0 10px #f0f, 0 0 20px #f0f;
            font-size: 2.5em; margin-top: 0; border-bottom: 2px dashed #333; padding-bottom: 15px;
        }
        .arcade-subtitle { color: #ff0; text-shadow: 0 0 8px #ff0; }
        .arcade-input {
            background: transparent; color: #0ff; border: none;
            border-bottom: 4px solid #0ff; font-size: 3em; width: 120px;
            text-align: center; outline: none; font-family: inherit; text-transform: uppercase;
            text-shadow: 0 0 15px #0ff; margin: 20px 0; letter-spacing: 10px;
        }
        .arcade-btn {
            background: transparent; color: #0f0; border: 3px solid #0f0;
            padding: 15px 30px; font-family: inherit; font-size: 1.5em; cursor: pointer;
            box-shadow: 0 0 15px #0f0, inset 0 0 10px #0f0; border-radius: 0;
            text-shadow: 0 0 5px #0f0; transition: all 0.2s;
        }
        .arcade-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }
        .arcade-btn-danger { color: #f00; border-color: #f00; box-shadow: 0 0 15px #f00, inset 0 0 10px #f00; text-shadow: 0 0 5px #f00; }
        .arcade-btn-danger:hover { background: #f00; color: #000; box-shadow: 0 0 30px #f00; }

        .arcade-table { width: 100%; margin-bottom: 30px; border-collapse: collapse; font-size: 1.2em; text-align: left; }
        .arcade-table th { color: #0ff; border-bottom: 2px dashed #0ff; padding: 10px 0; text-shadow: 0 0 5px #0ff; }
        .arcade-table td { padding: 8px 0; border-bottom: 1px dotted #333; }
        .arcade-table tr:nth-child(2) td { color: gold; text-shadow: 0 0 8px gold; }

        /* ================= GRA ================= */
        canvas { background: #e0fbfc; border: 3px solid var(--dark-blue); border-radius: 10px; margin: 10px auto; display: block; }
        .sliders { display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        #puzzle-board {
            display: grid; grid-template-columns: repeat(4, 100px);
            gap: 2px; justify-content: center; margin: 20px auto;
            background: #333; padding: 4px; width: max-content;
        }
        .tile {
            width: 100px; height: 100px;
            background-image: url('assets/images/puzzle1.jpg');
            background-size: 400px 300px; border: 1px solid rgba(255,255,255,0.5);
        }
        .tile.active { cursor: pointer; }
        .tile.selected { border: 3px solid red; z-index: 10; box-shadow: 0 0 10px red; }
        .quiz-answers { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .quiz-answers button { background: var(--sea-light); color: var(--dark-blue); font-size: 1.1em; }
        .quiz-answers button:hover { background: var(--sea-deep); color: white; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-menu" class="screen active">
        <h1>🌊 Bałtycka Akademia Odkrywców 🌊</h1>
        <p>Wybierz przygodę, aby rozpocząć naukową misję!</p>
        <button onclick="openWiry()">🌀 Zapanuj nad Wirami</button>
        <button onclick="openPuzzleMenu()">🧩 Morskie Puzzle</button>
        <button onclick="openQuizMenu()">❓ Quiz Oceaniczny</button>
        <br><br>
        <button class="score-btn" onclick="openScoreboard()">🏆 HALL OF FAME 🏆</button>
    </div>

    <div id="screen-wir" class="screen">
        <h2>Zapanuj nad Prądami (A → B)</h2>
        <canvas id="wirCanvas" width="400" height="400"></canvas>
        <div class="sliders">
            <label>Niebieski: <input type="range" id="v1" min="-4" max="4" step="0.1" value="1" oninput="drawWir()"></label>
            <label>Zielony: <input type="range" id="v2" min="-4" max="4" step="0.1" value="1" oninput="drawWir()"></label>
            <label>Pomarńcz.: <input type="range" id="v3" min="-4" max="4" step="0.1" value="1" oninput="drawWir()"></label>
        </div>
        <button class="action-btn" onclick="startWir()">Wypuść cząstkę</button>
        <br>
        <button class="back-btn" onclick="showScreen('screen-menu'); stopWir();">Wróć</button>
    </div>

    <div id="screen-puzzle-menu" class="screen">
        <h2>Wybierz poziom trudności</h2>
        <button onclick="openPuzzle('EASY', 4)">👶 Łatwy (Lekkie tasowanie)</button>
        <button onclick="openPuzzle('MEDIUM', 10)">🏖️ Średni (Mocniejsze tasowanie)</button>
        <button onclick="openPuzzle('HARD', 'full')">⚓ Trudny (Pełny chaos!)</button>
        <br><br>
        <button class="back-btn" onclick="showScreen('screen-menu')">Wróć</button>
    </div>

    <div id="screen-puzzle" class="screen">
        <h2>Morskie Puzzle</h2>
        <p>Ruchy: <span id="puzzle-moves" style="font-weight:bold; color:red;">0</span> | Czas: <span id="puzzle-timer" style="font-weight:bold; color:blue;">0s</span></p>
        <div id="puzzle-board"></div>
        <button id="btn-puzzle-start" class="action-btn" onclick="startPuzzle()">MIESZAJ I START!</button>
        <br><br>
        <button class="back-btn" onclick="showScreen('screen-puzzle-menu')">Wróć do wyboru</button>
    </div>

    <div id="screen-quiz-menu" class="screen">
        <h2>Wybierz poziom trudności</h2>
        <button onclick="startQuiz('seasy')">👶 Mały Odkrywca</button>
        <button onclick="startQuiz('easy')">🏖️ Plażowicz</button>
        <button onclick="startQuiz('medium')">⚓ Wilk Morski</button>
        <button onclick="startQuiz('hard')">🌐 Modelarz</button>
        <br><br>
        <button class="back-btn" onclick="showScreen('screen-menu')">Wróć</button>
    </div>

    <div id="screen-quiz" class="screen">
        <h2 id="quiz-progress">Pytanie 1</h2>
        <p id="quiz-question" style="font-size: 1.3em; font-weight: bold;"></p>
        <div class="quiz-answers" id="quiz-answers"></div>
        <button class="back-btn" onclick="showScreen('screen-menu')">Przerwij</button>
    </div>

    <div id="screen-name-entry" class="screen arcade-screen">
        <h2 class="arcade-title">NEW HIGH SCORE!</h2>
        <h3 class="arcade-subtitle" id="arcade-score-display">WYNIK: 0</h3>
        <p style="margin-top: 30px;">ENTER YOUR INITIALS:</p>
        <input type="text" id="arcade-initials" class="arcade-input" maxlength="3" autocomplete="off" oninput="this.value = this.value.replace(/[^a-zA-Z]/g, '').toUpperCase()">
        <br>
        <button class="arcade-btn" onclick="submitScore()">SAVE</button>
    </div>

    <div id="screen-scoreboard" class="screen arcade-screen">
        <h2 class="arcade-title">=== HALL OF FAME ===</h2>
        <div id="leaderboard-content" style="max-height: 450px; overflow-y: auto;"></div>
        <br>
        <button class="arcade-btn arcade-btn-danger" onclick="showScreen('screen-menu')">WRÓĆ</button>
    </div>
</div>

<script>
    // System interwałów (do czyszczenia timerów)
    let globalIntervals = [];
    function clearAllIntervals() { globalIntervals.forEach(clearInterval); globalIntervals = []; }
    function registerInterval(intId) { globalIntervals.push(intId); }

    // ================== NAWIGACJA ==================
    function showScreen(id) {
        clearAllIntervals();
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ================== SYSTEM WYNIKÓW ARCADE ==================
    let pendingScore = null;

    function saveScore(gameName, scoreText, numericScore, timeValue = null) {
        pendingScore = { gameName, scoreText, numericScore, timeValue };
        document.getElementById('arcade-score-display').innerText = `${gameName} - ${scoreText}`;
        document.getElementById('arcade-initials').value = '';
        showScreen('screen-name-entry');
        setTimeout(() => document.getElementById('arcade-initials').focus(), 100);
    }

    function submitScore() {
        let name = document.getElementById('arcade-initials').value.trim();
        if (name.length === 0) name = "AAA";
        
        let scores = JSON.parse(localStorage.getItem('morskieScoresArcade')) || {};
        if (!scores[pendingScore.gameName]) scores[pendingScore.gameName] = [];
        
        scores[pendingScore.gameName].push({ 
            name: name, 
            scoreText: pendingScore.scoreText, 
            num: pendingScore.numericScore, 
            time: pendingScore.timeValue 
        });
        
        // SORTOWANIE (Dynamiczne wykrywanie typu gry po nazwie)
        if(pendingScore.gameName.includes('QUIZ')) {
            scores[pendingScore.gameName].sort((a,b) => {
                if (b.num !== a.num) return b.num - a.num; 
                return a.time - b.time;
            });
        } else if(pendingScore.gameName.includes('PUZZLE')) {
            scores[pendingScore.gameName].sort((a,b) => {
                if (a.time !== b.time) return a.time - b.time;
                return a.num - b.num;
            });
        } else {
            scores[pendingScore.gameName].sort((a,b) => a.num - b.num);
        }
        
        scores[pendingScore.gameName] = scores[pendingScore.gameName].slice(0, 5);
        localStorage.setItem('morskieScoresArcade', JSON.stringify(scores));
        
        openScoreboard();
    }

    function openScoreboard() {
        showScreen('screen-scoreboard');
        const container = document.getElementById('leaderboard-content');
        let scores = JSON.parse(localStorage.getItem('morskieScoresArcade')) || {};
        container.innerHTML = '';

        // Pobranie i posortowanie wszystkich kluczy gier alfabetycznie
        const games = Object.keys(scores).sort();
        
        if (games.length === 0) {
            container.innerHTML = `<p style="color:#555; text-align:center;">NO DATA... PLAY A GAME!</p>`;
            return;
        }

        games.forEach(g => {
            let html = `<h3 style="color:#f0f; border-bottom: 1px solid #f0f; display:inline-block; margin-top:20px;">> ${g} <</h3>`;
            html += `<table class="arcade-table"><tr><th>RANK</th><th>NAME</th><th>SCORE</th><th>TIME</th></tr>`;
            scores[g].forEach((s, idx) => {
                let timeStr = (s.time !== null && s.time !== undefined) ? `${s.time}s` : '---';
                html += `<tr><td>#${idx+1}</td><td>${s.name}</td><td>${s.scoreText}</td><td>${timeStr}</td></tr>`;
            });
            html += `</table>`;
            container.innerHTML += html;
        });
    }

    // ================== GRA 1: WIRY ==================
    let wirAnim; let isRunning = false;
    const ctx = document.getElementById('wirCanvas').getContext('2d');
    const W = 400, H = 400, bounds = 2.9, dt = 0.04, eps = 0.08, targetRadius = 0.18;
    const A = { x: -2.5, y: -2.0 }, B = { x: 2.3, y: 2.0 };
    let particle = { x: A.x, y: A.y }; let traj = []; let pathLength = 0;
    const vortices = [{ x: -1.4, y: 0.0, color: "blue", el: "v1" }, { x: 0.0, y: 1.4, color: "green", el: "v2" }, { x: 1.4, y: -1.0, color: "orange", el: "v3" }];
    const toPixX = (x) => ((x + 3) / 6) * W, toPixY = (y) => H - ((y + 3) / 6) * H;

    function openWiry() { showScreen('screen-wir'); stopWir(); particle = { x: A.x, y: A.y }; traj = []; pathLength = 0; drawWir(); }
    function startWir() { stopWir(); particle = { x: A.x, y: A.y }; traj = []; pathLength = 0; isRunning = true; animateWir(); }
    function stopWir() { isRunning = false; if (wirAnim) cancelAnimationFrame(wirAnim); }
    function getVelocity(x, y) {
        let u = 0, v = 0;
        vortices.forEach(vt => {
            let strength = parseFloat(document.getElementById(vt.el).value), dx = x - vt.x, dy = y - vt.y;
            let r2 = dx*dx + dy*dy + eps; u += -strength * dy / r2; v +=  strength * dx / r2;
        });
        return { u, v };
    }
    function drawWir() {
        ctx.clearRect(0, 0, W, H); ctx.strokeStyle = "rgba(0, 100, 200, 0.3)"; ctx.lineWidth = 1.5;
        const step = 6 / 15;
        for(let gx = -3; gx <= 3; gx += step) {
            for(let gy = -3; gy <= 3; gy += step) {
                let { u, v } = getVelocity(gx, gy); let mag = Math.sqrt(u*u + v*v);
                if(mag > 3) { u = (u/mag)*3; v = (v/mag)*3; }
                const scale = 0.15, px1 = toPixX(gx), py1 = toPixY(gy), px2 = toPixX(gx + u * scale), py2 = toPixY(gy + v * scale);
                ctx.beginPath(); ctx.moveTo(px1, py1); ctx.lineTo(px2, py2);
                const angle = Math.atan2(py2 - py1, px2 - px1);
                ctx.lineTo(px2 - 4 * Math.cos(angle - Math.PI/6), py2 - 4 * Math.sin(angle - Math.PI/6)); ctx.moveTo(px2, py2); ctx.lineTo(px2 - 4 * Math.cos(angle + Math.PI/6), py2 - 4 * Math.sin(angle + Math.PI/6)); ctx.stroke();
            }
        }
        ctx.beginPath(); ctx.arc(toPixX(B.x), toPixY(B.y), targetRadius * (W/6), 0, Math.PI * 2); ctx.fillStyle = "rgba(128, 0, 128, 0.3)"; ctx.fill(); ctx.fillStyle = "purple"; ctx.fillText("B", toPixX(B.x)-4, toPixY(B.y)+4);
        ctx.beginPath(); ctx.arc(toPixX(A.x), toPixY(A.y), 6, 0, Math.PI * 2); ctx.fillStyle = "black"; ctx.fill(); ctx.fillText("A", toPixX(A.x)-4, toPixY(A.y)+15);
        vortices.forEach(v => { ctx.beginPath(); ctx.arc(toPixX(v.x), toPixY(v.y), 7, 0, Math.PI * 2); ctx.fillStyle = v.color; ctx.fill(); });
        if (traj.length > 1) { ctx.beginPath(); ctx.moveTo(toPixX(traj[0].x), toPixY(traj[0].y)); for(let i=1; i<traj.length; i++) ctx.lineTo(toPixX(traj[i].x), toPixY(traj[i].y)); ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.stroke(); }
        ctx.beginPath(); ctx.arc(toPixX(particle.x), toPixY(particle.y), 6, 0, Math.PI * 2); ctx.fillStyle = "red"; ctx.fill();
    }
    function animateWir() {
        if (!isRunning) return;
        let { u, v } = getVelocity(particle.x, particle.y);
        let nx = particle.x + u * dt, ny = particle.y + v * dt;
        if(Math.abs(nx) > bounds) nx = Math.sign(nx) * bounds; if(Math.abs(ny) > bounds) ny = Math.sign(ny) * bounds;
        pathLength += Math.sqrt(Math.pow(nx - particle.x, 2) + Math.pow(ny - particle.y, 2));
        particle.x = nx; particle.y = ny; traj.push({x: nx, y: ny});
        drawWir();
        if (Math.sqrt(Math.pow(particle.x - B.x, 2) + Math.pow(particle.y - B.y, 2)) < targetRadius) {
            isRunning = false; setTimeout(() => saveScore("WIRY", `${pathLength.toFixed(1)} PKT`, pathLength), 300); return;
        }
        wirAnim = requestAnimationFrame(animateWir);
    }

    // ================== GRA 2: PUZZLE ==================
    let puzzlePos = [], puzzleCorrect = [], selectedTile = null;
    let puzzleMoves = 0, puzzleStartTime = 0, puzzleActive = false;
    let currentPuzzleLevel = '';
    let currentShuffleAmount = 'full';

    // TUTAJ WPISZ NAZWY SWOICH PLIKÓW Z FOLDERU:
    const myImages = [
        'assets/images/puzzle1.jpg',
        'assets/images/puzzle2.jpg',
        'assets/images/puzzle3.jpg'
    ];
    let currentImageUrl = '';

    function openPuzzleMenu() { showScreen('screen-puzzle-menu'); }

    function openPuzzle(levelName, shuffleAmount) {
        currentPuzzleLevel = levelName;
        currentShuffleAmount = shuffleAmount;
        currentImageUrl = myImages[Math.floor(Math.random() * myImages.length)];
        
        showScreen('screen-puzzle');
        document.getElementById('btn-puzzle-start').style.display = 'inline-block';
        puzzleActive = false; puzzleMoves = 0;
        document.getElementById('puzzle-moves').innerText = '0';
        document.getElementById('puzzle-timer').innerText = '0s';
        
        puzzlePos = []; puzzleCorrect = []; selectedTile = null;
        for(let r=0; r<3; r++) { for(let c=0; c<4; c++) { puzzleCorrect.push({r, c}); puzzlePos.push({r, c}); } }
        renderPuzzle();
    }

    function startPuzzle() {
        document.getElementById('btn-puzzle-start').style.display = 'none';
        puzzleActive = true;
        puzzleStartTime = Date.now();
        
        // Logika tasowania zależna od wybranego poziomu
        if (currentShuffleAmount === 'full') {
            for(let i = puzzlePos.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [puzzlePos[i], puzzlePos[j]] = [puzzlePos[j], puzzlePos[i]];
            }
        } else {
            let swaps = parseInt(currentShuffleAmount);
            for(let i=0; i<swaps; i++) {
                let a = Math.floor(Math.random() * puzzlePos.length);
                let b = Math.floor(Math.random() * puzzlePos.length);
                // Upewniamy się, że wykonujemy rzeczywistą zmianę
                if (a !== b) {
                    [puzzlePos[a], puzzlePos[b]] = [puzzlePos[b], puzzlePos[a]];
                } else {
                    i--; // Losujemy ponownie
                }
            }
        }
        
        let tInt = setInterval(() => { document.getElementById('puzzle-timer').innerText = Math.floor((Date.now() - puzzleStartTime)/1000) + 's'; }, 1000);
        registerInterval(tInt);
        
        renderPuzzle();
    }

    function renderPuzzle() {
        const board = document.getElementById('puzzle-board'); board.innerHTML = '';
        puzzlePos.forEach((pos, index) => {
            let div = document.createElement('div'); div.className = 'tile';
            if(puzzleActive) div.classList.add('active');
            if(selectedTile === index) div.classList.add('selected');
            div.style.backgroundPosition = `-${pos.c * 100}px -${pos.r * 100}px`;
            div.style.backgroundImage = `url('${currentImageUrl}')`;
            
            if(puzzleActive) {
                div.onclick = () => {
                    if(selectedTile === null) { selectedTile = index; } 
                    else {
                        let temp = puzzlePos[selectedTile]; puzzlePos[selectedTile] = puzzlePos[index]; puzzlePos[index] = temp;
                        selectedTile = null; puzzleMoves++; document.getElementById('puzzle-moves').innerText = puzzleMoves;
                        checkPuzzleWin();
                    }
                    renderPuzzle();
                };
            }
            board.appendChild(div);
        });
    }

    function checkPuzzleWin() {
        let win = true;
        for(let i=0; i<puzzlePos.length; i++){ if(puzzlePos[i].r !== puzzleCorrect[i].r || puzzlePos[i].c !== puzzleCorrect[i].c) { win = false; break; } }
        if(win) {
            puzzleActive = false;
            clearAllIntervals();
            let finalTime = Math.floor((Date.now() - puzzleStartTime)/1000);
            setTimeout(() => saveScore(`PUZZLE (${currentPuzzleLevel})`, `${puzzleMoves} RUCHOW`, puzzleMoves, finalTime), 300);
        }
    }

    // ================== GRA 3: QUIZ ==================
    // ================== GRA 3: QUIZ ==================
    // GŁÓWNA BAZA PYTAŃ (Działa zawsze, nawet bez pliku quiz.txt)
    const fallbackQuestions = [
        // BABY
        {level:"baby", q:"Co pływa po wodzie?", a:["Statek","Samolot","Samochód","Rower"], c:0},
        {level:"baby", q:"Jakiego koloru jest morze?", a:["Niebieskie","Czerwone","Zielone","Żółte"], c:0},
        {level:"baby", q:"Kto mieszka w muszli?", a:["Ryba","Krab","Słoń","Ptak"], c:1},
        {level:"baby", q:"Co daje fale na morzu?", a:["Wiatr","Piłka","Drzewo","Kamień"], c:0},
        {level:"baby", q:"Pływak Argo to:", a:["Bujający statek","Morska zabawka","Boja badawcza","Ryba"], c:2},
        {level:"baby", q:"Co możemy znaleźć na plaży?", a:["Piasek","Śnieg","Kwiaty","Kamień"], c:0},
        {level:"baby", q:"Kto mieszka w oceanie?", a:["Ryby","Psy","Ptaki","Koty"], c:0},
        {level:"baby", q:"Co można zbierać na plaży?", a:["Muszle","Książki","Samochody","Klocki"], c:0},
        {level:"baby", q:"Pływak Argo wygląda jak:", a:["Mała żółta boja","Samolot","Kot","Książka"], c:0},
        {level:"baby", q:"Co unosi się na wodzie?", a:["Drewniana deska","Kamień","Ziemniak","Krzesło"], c:0},
        
        // EASY
        {level:"easy", q:"Fale morskie powstają głównie na skutek:", a:["pływów","wiatru","prądów","opadów"], c:1},
        {level:"easy", q:"Jednostką prędkości wiatru jest:", a:["Pa","m/s","°C","m"], c:1},
        {level:"easy", q:"Cofka to:", a:["spadek poziomu morza","podniesienie poziomu morza przy brzegu","brak fal","zmiana zasolenia"], c:1},
        {level:"easy", q:"Najspokojniejsze morze występuje zwykle przy:", a:["silnym wietrze","braku wiatru","sztormie","niskim ciśnieniu"], c:1},
        {level:"easy", q:"Bałtyk jest morzem:", a:["otwartym","półzamkniętym","tropikalnym","oceanem"], c:1},
        {level:"easy", q:"Sztorm na morzu oznacza:", a:["ciszę","silny wiatr i wysokie fale","spadek ciśnienia","wysokie zasolenie"], c:1},
        {level:"easy", q:"Pływaki Argo służą do:", a:["mierzenia głębokości stawów","pomiary oceanograficzne","wyławiania ryb","stania na plaży"], c:1},
        {level:"easy", q:"Wiatr północny w Polsce wieje od:", a:["południa","północy","wschodu","zachodu"], c:1},
        {level:"easy", q:"Morze jest słone bo:", a:["słońce paruje wodę","woda deszczowa jest słona","prądy mieszają sól","ryby solą wodę"], c:0},
        {level:"easy", q:"Sinice w morzu są efektem:", a:["czystości wody","wysokiej temp. i składników odżywczych","wiatru","prądów"], c:1},

        // MEDIUM
        {level:"medium", q:"Jeśli okres fali wynosi 5 s to częstotliwość wynosi:", a:["5 Hz","0.5 Hz","0.2 Hz","1 Hz"], c:2},
        {level:"medium", q:"Okres fali to czas:", a:["między grzbietami","jednego obrotu Ziemi","między kolejnymi grzbietami","narastania fali"], c:2},
        {level:"medium", q:"Który czynnik NAJBARDZIEJ wpływa na wysokość fali?", a:["zasolenie","temperatura","wiatr","opady"], c:2},
        {level:"medium", q:"Co to jest cofka?", a:["gwałtowny odpływ wody","podniesienie poziomu przy brzegu","spadek ciśnienia","prąd"], c:1},
        {level:"medium", q:"Fala martwa powstaje gdy:", a:["nie ma wiatru","jest sztorm","prąd przyspiesza","ciepła woda opada"], c:0},
        {level:"medium", q:"Temperatura wody wpływa na:", a:["prędkość wiatru","gęstość wody i prądy","położenie plaży","pH wody"], c:1},
        {level:"medium", q:"Prądy powierzchniowe są wywołane głównie przez:", a:["wiatr","pływy","słońce","ryby"], c:0},
        {level:"medium", q:"Pływaki Argo pomagają w prognozowaniu:", a:["pogody w górach","prądów i temp. oceanu","kierunku wiatrów lądowych","poziomu jezior"], c:1},
        {level:"medium", q:"Jak działa Boja Argo?", a:["rejestruje tylko fale","mierzy temperaturę i zasolenie","wypuszcza ryby","podnosi poziom wody"], c:1},
        {level:"medium", q:"Kiedy występuje największe wzburzenie w Bałtyku?", a:["latem","zimą","wiosną","jesienią"], c:3},

        // HARD
        {level:"hard", q:"Podwojenie prędkości wiatru powoduje wzrost energii około:", a:["2x","3x","4x","8x"], c:2},
        {level:"hard", q:"Dlaczego prognozy fal mają ograniczoną dokładność?", a:["modele są złe","morze jest chaotyczne","brak komputerów","za dużo danych"], c:1},
        {level:"hard", q:"Wzrost poziomu morza o 0.5 m powoduje ryzyko zalania:", a:["liniowe","malejące","nieliniowe","brak zmian"], c:2},
        {level:"hard", q:"Model numeryczny najlepiej służy do:", a:["dokładnej pogody za miesiąc","analizy scenariuszy","zgadywania","zastąpienia pomiarów"], c:1},
        {level:"hard", q:"Efekt Coriolisa wpływa na:", a:["wiatr i prądy","tylko na fale","pH wody","położenie plaży"], c:0},
        {level:"hard", q:"Martwe strefy w morzu są wynikiem:", a:["wysokiego tlenu","niskiego tlenu i nadmiaru składników","wiatru","pływów"], c:1},
        {level:"hard", q:"Pływaki Argo w ciężkich warunkach:", a:["nie działają","pływają i rejestrują dane","toną","zmieniają kierunek wiatru"], c:1},
        {level:"hard", q:"Argo dostarcza dane o:", a:["Temperaturze, zasoleniu i prądach","Pogodzie w górach","Ruchu samolotów","Ruchu ptaków"], c:0},
        {level:"hard", q:"Największe fale na Bałtyku są zwykle przy wiatrach:", a:["południowych","wschodnich","zachodnich","północnych"], c:3},
        {level:"hard", q:"Zjawisko cofki jest szczególnie groźne dla:", a:["statków w porcie","plażowiczów","rybaków przy brzegu","wszystkich powyższych"], c:3}
    ];

    let quizQueue = [], currentQ = 0, quizScore = 0, quizStartTime = 0, currentQuizLevel = '';

    function openQuizMenu() { showScreen('screen-quiz-menu'); }

    async function startQuiz(level) {
        currentQuizLevel = level.toUpperCase();
        let loadedQuestions = [];
        
        // Próbujemy wczytać z pliku quiz.txt
        try {
            const response = await fetch('quiz.txt');
            if (response.ok) {
                const text = await response.text();
                const lines = text.split('\n').filter(l => l.trim().length > 0);
                lines.forEach(line => {
                    const parts = line.split('|');
                    // Usuwamy \r jeśli istnieje (częsty błąd w plikach tekstowych Windowsa)
                    if(parts.length === 4) { 
                        loadedQuestions.push({ 
                            q: parts[0], 
                            a: parts[1].split(','), 
                            c: parseInt(parts[2]), 
                            level: parts[3].trim().replace(/\r/g, '').toLowerCase() 
                        }); 
                    }
                });
            }
        } catch (e) { 
            console.log("Nie odnaleziono quiz.txt, używam pełnej bazy z kodu!"); 
        }

        // Jeśli się nie udało (plik pusty, błąd CORS, itp.), bierzemy pytania wbudowane w kod
        if (loadedQuestions.length === 0) {
            loadedQuestions = fallbackQuestions;
        }

        // Filtrujemy po poziomie
        let pool = loadedQuestions.filter(q => q.level === level.toLowerCase());
        
        // Zabezpieczenie ostateczne - jeśli dany poziom z jakiegoś powodu jest pusty
        if(pool.length === 0) pool = fallbackQuestions.filter(q => q.level === level.toLowerCase()); 
        
        // Tasujemy pulę i wybieramy 5 pytań
        quizQueue = pool.sort(() => 0.5 - Math.random()).slice(0, 5);
        currentQ = 0; 
        quizScore = 0; 
        
        showScreen('screen-quiz');
        quizStartTime = Date.now();
        renderQuestion();
    }

    function renderQuestion() {
        if(currentQ >= quizQueue.length) {
            let finalTime = Math.floor((Date.now() - quizStartTime) / 1000);
            let p = Math.round((quizScore/quizQueue.length)*100);
            setTimeout(() => saveScore(`QUIZ (${currentQuizLevel})`, `${p}% POPRAWNIE`, p, finalTime), 200);
            return;
        }
        let q = quizQueue[currentQ];
        document.getElementById('quiz-progress').innerText = `Pytanie ${currentQ + 1}/${quizQueue.length}`;
        document.getElementById('quiz-question').innerText = q.q;
        let answersDiv = document.getElementById('quiz-answers'); answersDiv.innerHTML = '';
        
        q.a.forEach((ans, idx) => {
            let btn = document.createElement('button'); btn.innerText = ans;
            btn.onclick = () => { if(idx === q.c) quizScore++; currentQ++; renderQuestion(); };
            answersDiv.appendChild(btn);
        });
    }

    // Inicjalizacja pierwszej gry przy wejściu na stronę
    drawWir();

</script>
